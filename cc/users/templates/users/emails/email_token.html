<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your verification code</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: #f9f9f9; margin: 0; padding: 0; }
    .wrapper { max-width: 560px; margin: 40px auto; background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.08); overflow: hidden; }
    .header { background: #1a1a2e; padding: 32px 40px; text-align: center; }
    .header h1 { color: #fff; font-size: 20px; margin: 0; letter-spacing: .5px; }
    .body { padding: 40px; color: #333; font-size: 15px; line-height: 1.6; }
    .code-block { margin: 32px 0; text-align: center; }
    .code { display: inline-block; font-size: 36px; font-weight: 700; letter-spacing: 8px; color: #1a1a2e; background: #f0f0f5; border-radius: 8px; padding: 16px 32px; }
    .footer { padding: 24px 40px; font-size: 12px; color: #999; border-top: 1px solid #eee; text-align: center; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1>Cantoral Católico</h1>
    </div>
    <div class="body">
      <p>Hi {{ name }},</p>
      <p>Use the code below to verify your identity. It expires in <strong>20 minutes</strong>.</p>
      <div class="code-block">
        <span class="code">{{ token }}</span>
      </div>
      <p>If you did not request this code, you can safely ignore this email.</p>
    </div>
    <div class="footer">
      &copy; Cantoral Católico — do not reply to this email.
    </div>
  </div>
</body>
</html>
